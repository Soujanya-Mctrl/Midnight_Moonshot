name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group:
    ${{ github.event_name != 'merge_group' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #v6.0.3

      - name: Setup Compact Compiler
        uses: midnightntwrk/setup-compact-action@836895c8fffbbea6bd986af2b17e8941ff29d1f8
        with:
          compact-version: '0.31.1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  #v6.4.0
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate contract source
        run: |
          cat > contracts/hello-world.compact <<'EOF'
          pragma language_version 0.23;

          export ledger message: Opaque<"string">;

          export circuit storeMessage(newMessage: Opaque<"string">): [] {
            message = disclose(newMessage);
          }
          EOF

      - name: Compile contract
        run: yarn compile

      - name: Start local Midnight network
        run: yarn env:up

      - name: Wait for DUST to accrue
        run: npx vite-node scripts/wait-for-dust.ts

      - name: Run tests against local network
        run: yarn test:local

      - name: Dump container logs on failure
        if: failure()
        run: |
          mkdir -p logs
          docker compose ps -a > logs/compose-ps.log 2>&1 || true
          docker compose logs --no-color > logs/compose.log 2>&1 || true

      - name: Stop local Midnight network
        if: always()
        run: yarn env:down

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  #v7.0.1
        with:
          name: docker-compose-logs
          path: logs/
          if-no-files-found: ignore
          retention-days: 7
